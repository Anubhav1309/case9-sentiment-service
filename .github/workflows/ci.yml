# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Two pipelines:
#   1. `test`          — runs on every PR / push to main  (lint + unit tests)
#   2. `retrain-gate`  — runs only when data/train.csv changes on a PR
#                        Retrains → evaluates → blocks merge if F1 regresses
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  BASELINE_F1: "0.92"          # override in repo Settings → Secrets for accuracy

jobs:
  # ── Job 1: Lint + Unit Tests ───────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app/ retrain/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ── Job 2: Retrain Gate (only when training data changes) ──────────────────
  retrain-gate:
    name: Retrain & Metric Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test     # don't waste compute if tests already failed

    steps:
      - uses: actions/checkout@v4

      # FIX: dorny/paths-filter correctly detects which files changed in the PR.
      # The old approach used contains(github.event.pull_request.changed_files, ...)
      # but changed_files is an integer count, not a list — so it never matched.
      - name: Check if training data changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            training:
              - 'data/train.csv'

      - name: Set up Python
        if: steps.filter.outputs.training == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        if: steps.filter.outputs.training == 'true'
        run: pip install -r requirements.txt

      - name: Cache HuggingFace model
        if: steps.filter.outputs.training == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-distilbert-sst2

      - name: Retrain & evaluate candidate model
        if: steps.filter.outputs.training == 'true'
        env:
          BASELINE_F1: ${{ env.BASELINE_F1 }}
        run: |
          python retrain/retrain.py \
            --train_file data/train.csv \
            --eval_file  data/eval.csv \
            --output_dir models/candidate \
            --baseline_f1 $BASELINE_F1 \
            --min_f1_delta -0.01 \
            --epochs 2
        # Exit code 1 → step fails → PR blocked from merging

      - name: Upload eval metrics artifact
        if: always() && steps.filter.outputs.training == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: models/candidate/eval_metrics.json

      - name: Comment metrics on PR
        if: always() && steps.filter.outputs.training == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🤖 Retrain Gate Results\n\n';
            try {
              const metrics = JSON.parse(fs.readFileSync('models/candidate/eval_metrics.json', 'utf8'));
              const passed  = metrics.gate_passed;
              const icon    = passed ? '✅' : '❌';
              body += `**Gate:** ${icon} ${passed ? 'PASSED' : 'FAILED'}\n\n`;
              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| Baseline F1 | ${metrics.baseline_f1.toFixed(4)} |\n`;
              body += `| Candidate F1 | ${metrics.f1_weighted.toFixed(4)} |\n`;
              body += `| Delta | ${metrics.delta >= 0 ? '+' : ''}${metrics.delta.toFixed(4)} |\n`;
              if (!passed) {
                body += `\n> ⚠️ **Merge blocked** — candidate regressed beyond the allowed threshold.`;
              }
            } catch (e) {
              body += '⚠️ Could not parse eval_metrics.json — check logs.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Job 3: Docker build smoke-test ────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sentiment-service:ci .

      - name: Smoke test container
        run: |
          docker run -d --name svc -p 8000:8000 sentiment-service:ci
          sleep 90   # wait for model load
          curl -f http://localhost:8000/health
          docker stop svc